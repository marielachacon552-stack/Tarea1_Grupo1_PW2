<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Hipotenusa</title>
    <link rel="stylesheet" href="css/estilos-hipotenusa.css">
</head>
<body>
<div class="container">
    <h1>📐 Calculadora de Hipotenusa</h1>
    <p class="subtitle">Ingresa los catetos del triángulo rectángulo</p>
    <form method="post" action="hipotenusa">
        <div class="form-group">
            <label for="a">Cateto A:</label>
            <input type="number" id="a" name="a" step="1" min="1" required>
        </div>
        <div class="form-group">
            <label for="b">Cateto B:</label>
            <input type="number" id="b" name="b" step="1" min="1" required>
        </div>
        <button type="submit">Calcular Hipotenusa</button>
    </form>
    <a href="index.html" class="back-link">← Volver al menú</a>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayor, Menor y Moda</title>
    <link rel="stylesheet" href="css/estilos-numeros.css">
</head>
<body>
<div class="container">
    <h1>🔢 Mayor, Menor y Moda</h1>
    <form method="post" action="numeros">
        <div class="form-group">
            <label class="form-label">Selecciona la operación:</label>
            <div class="option-container">
                <label class="option-item"><input type="radio" name="operacion" value="mayor" checked> 📊 Encontrar el Mayor</label>
                <label class="option-item"><input type="radio" name="operacion" value="menor"> 📉 Encontrar el Menor</label>
                <label class="option-item"><input type="radio" name="operacion" value="moda"> 🎯 Encontrar la Moda</label>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="numeros">Ingresa los números (separados por comas):</label>
            <input type="text" id="numeros" name="numeros" placeholder="Ej: 5, 10, 3, 8, 15" required>
            <div class="input-hint">✓ Separa los números con comas (,)</div>
        </div>
        <input type="submit" value="Calcular">
    </form>
    <a href="index.html" class="back-link">← Volver al menú principal</a>
</div>
</body>
</html>
